<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖面板测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1976d2;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
        }
        .test-section h2 {
            color: #1976d2;
            margin-top: 0;
        }
        button {
            padding: 10px 20px;
            background-color: #1976d2;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #1565c0;
        }
        select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-width: 300px;
        }
        .student-card {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }
        .lottery-wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 8px solid #f0f7ff;
            box-shadow: 0 8px 24px rgba(25,118,210,0.2);
            margin: 20px auto;
            position: relative;
            background: conic-gradient(
                #FF6B6B 0deg 40deg,
                #4ECDC4 40deg 80deg,
                #45B7D1 80deg 120deg,
                #96CEB4 120deg 160deg,
                #FFEAA7 160deg 200deg,
                #DDA0DD 200deg 240deg,
                #98D8C8 240deg 280deg,
                #F7DC6F 280deg 320deg,
                #BB8FCE 320deg 360deg
            );
        }
        .lottery-pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid #e74c3c;
            z-index: 10;
        }
        .prizes-list {
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 10px;
        }
        .prize-item {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .prize-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>抽奖面板测试</h1>
        
        <div class="test-section">
            <h2>1. 学生选择测试</h2>
            <label for="testStudentSelect">选择学生:</label>
            <select id="testStudentSelect">
                <option value="">-- 请选择学生 --</option>
                <option value="1">学生1</option>
                <option value="2">学生2</option>
                <option value="3">学生3</option>
            </select>
            <div class="student-card" id="testStudentCard">
                <h3>学生信息</h3>
                <p>姓名: <span id="testStudentName">--</span></p>
                <p>班级: <span id="testStudentClass">--</span></p>
                <p>总积分: <span id="testStudentPoints">--</span></p>
            </div>
        </div>
        
        <div class="test-section">
            <h2>2. 抽奖转盘测试</h2>
            <div class="lottery-wheel">
                <div class="lottery-pointer"></div>
            </div>
            <button id="testSpinButton">开始抽奖</button>
        </div>
        
        <div class="test-section">
            <h2>3. 奖品列表测试</h2>
            <div class="prizes-list" id="testPrizesList">
                <div class="prize-item">
                    <strong>免值日卡*1</strong> - 免一次值日任务
                </div>
                <div class="prize-item">
                    <strong>小零食</strong> - 美味小零食一份
                </div>
                <div class="prize-item">
                    <strong>文具礼包</strong> - 精美文具套装
                </div>
                <div class="prize-item">
                    <strong>优先选择权</strong> - 优先选择座位/任务
                </div>
                <div class="prize-item">
                    <strong>贴纸集</strong> - 可爱贴纸一套
                </div>
                <div class="prize-item">
                    <strong>再来一次</strong> - 免费再抽一次
                </div>
                <div class="prize-item">
                    <strong>神秘盲盒</strong> - 随机神秘礼物
                </div>
                <div class="prize-item">
                    <strong>表扬信</strong> - 老师亲笔表扬信
                </div>
                <div class="prize-item">
                    <strong>谢谢参与</strong> - 下次好运哦
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 测试学生选择功能
        document.getElementById('testStudentSelect').addEventListener('change', function() {
            const studentId = this.value;
            const card = document.getElementById('testStudentCard');
            const name = document.getElementById('testStudentName');
            const studentClass = document.getElementById('testStudentClass');
            const points = document.getElementById('testStudentPoints');
            
            if (studentId) {
                card.style.display = 'block';
                name.textContent = `学生${studentId}`;
                studentClass.textContent = '三年级一班';
                points.textContent = Math.floor(Math.random() * 100) + 1;
            } else {
                card.style.display = 'none';
            }
        });
        
        // 测试抽奖功能
        document.getElementById('testSpinButton').addEventListener('click', function() {
            alert('抽奖功能测试成功！');
        });
    </script>
</body>
</html>
