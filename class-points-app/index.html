<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>班级积分管理系统</title>
    <script>
      (function() {
        var isLocal = location.protocol === 'file:';
        var hasDist = false;
        try { hasDist = typeof window !== 'undefined'; } catch (e) {}
        if (isLocal) {
          window.location.href = 'dist/index.html';
          return;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="padding:20px;font-family:sans-serif;">请启用 JavaScript 后刷新页面。</p>
    </noscript>
    <p id="run-hint" style="display:none;padding:24px;font-family:sans-serif;color:#333;background:#f5f5f5;margin:20px;border-radius:8px;">
      <strong>无法加载应用</strong><br><br>
      若需直接双击打开，请先运行 <strong>打开应用.bat</strong> 完成构建。<br><br>
      开发模式：在项目目录执行 <code>npm run dev</code>，然后访问 <strong>http://localhost:5173</strong>
    </p>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        var hint = document.getElementById('run-hint');
        if (hint && root && !root.querySelector('*')) {
          hint.style.display = 'block';
        }
      }, 2500);
    </script>
  </body>
</html>
