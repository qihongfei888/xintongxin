<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神兽养成 · 新系统</title>
  <link rel="stylesheet" href="../styles.css?v=6">
  <style>
    .beast-shell { max-width: 980px; margin: 20px auto; padding: 0 12px; }
    .beast-badge { display:inline-flex; gap:8px; align-items:center; padding:6px 10px; border-radius:999px; background: rgba(255,255,255,0.7); border:1px solid rgba(0,0,0,0.06); }
    .beast-grid { display:grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 860px){ .beast-grid{ grid-template-columns: 1fr 1fr; } }
    .beast-card { background: var(--card-bg); border-radius: 18px; padding: 16px; border:2px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .beast-card h2 { margin:0 0 8px; font-size: 1.2rem; }
    .beast-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .beast-row .login-input{ flex: 1 1 180px; }
    .beast-status { margin-top: 10px; color: var(--text-muted); }
    .beast-gallery { display:grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
    .beast-stage { border-radius: 14px; border: 2px solid var(--border); background: rgba(255,255,255,0.7); padding: 10px; text-align:center; }
    .beast-stage img { width:100%; height: 120px; object-fit: cover; border-radius: 12px; background: #f3f3f3; }
    .beast-stage .t { margin-top: 6px; font-size: 0.9rem; font-weight: 600; }
    .beast-stage .s { margin-top: 2px; font-size: 0.85rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="beast-shell">
    <div class="beast-badge">
      <span>🐉</span>
      <strong>神兽养成（独立系统）</strong>
      <span style="color:var(--text-muted)">数据与“童心宠伴”完全隔离</span>
    </div>

    <div class="beast-grid" style="margin-top:14px;">
      <div class="beast-card">
        <h2>🔐 登录（复用现有账号）</h2>
        <div class="beast-row">
          <input id="beastUsername" class="login-input" placeholder="手机号/邮箱">
          <input id="beastPassword" class="login-input" type="password" placeholder="密码">
          <button class="btn btn-primary btn-cute" id="beastLoginBtn">登录</button>
        </div>
        <div class="beast-status" id="beastLoginStatus">未登录</div>
      </div>

      <div class="beast-card">
        <h2>☁️ 云同步（Supabase，独立数据）</h2>
        <div class="beast-row">
          <button class="btn btn-primary btn-cute" id="beastUploadBtn">上传到云端</button>
          <button class="btn btn-secondary btn-cute" id="beastDownloadBtn">从云端恢复</button>
        </div>
        <div class="beast-status" id="beastSyncStatus">云同步状态：等待操作</div>
      </div>
    </div>

    <div class="beast-card" style="margin-top:14px;">
      <h2>✨ 神兽预览（示例：青龙）</h2>
      <div style="color:var(--text-muted);font-size:0.9rem;">你把图片按 `photos/beast/qinglong/stage1.jpg ~ stage5.jpg` 放好后，这里就会自动显示。</div>
      <div class="beast-gallery" id="beastPreview">
        <!-- JS render -->
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="./runtime.js"></script>
</body>
</html>
